name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build release binary
        run: cargo build -p moly-shell --release

      - name: Package .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          mkdir -p "Moxin Studio.app/Contents/MacOS"
          mkdir -p "Moxin Studio.app/Contents/Resources"

          cp target/release/moxin-studio "Moxin Studio.app/Contents/MacOS/moxin-studio"
          chmod +x "Moxin Studio.app/Contents/MacOS/moxin-studio"

          cp moly-shell/resources/AppIcon.icns "Moxin Studio.app/Contents/Resources/AppIcon.icns"

          cat > "Moxin Studio.app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Moxin Studio</string>
              <key>CFBundleDisplayName</key>
              <string>Moxin Studio</string>
              <key>CFBundleIdentifier</key>
              <string>ai.moxin.studio</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleExecutable</key>
              <string>moxin-studio</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Ad-hoc code sign
        run: codesign --force --deep -s - "Moxin Studio.app"

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R "Moxin Studio.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="MoxinStudio-${VERSION}-arm64.dmg"

          hdiutil create -volname "Moxin Studio" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ env.DMG_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
          draft: true
          body: |
            ## Installation

            1. Download `${{ env.DMG_NAME }}`
            2. Open the DMG and drag **Moxin Studio** to Applications
            3. Before first launch, run in Terminal:
               ```
               xattr -cr /Applications/Moxin\ Studio.app
               ```
               (This removes the macOS quarantine flag for unsigned apps)

            ### Requirements
            - macOS 14.0+ (Sonoma) on Apple Silicon (M1–M5)
            - For local model inference: [OminiX-API](https://github.com/OminiX-ai/OminiX-API)

            ### Cloud-only mode
            No additional setup needed — open Settings and add your API keys for OpenAI, Anthropic, Gemini, DeepSeek, or other providers.
