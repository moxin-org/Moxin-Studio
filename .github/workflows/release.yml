name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build release binary
        run: cargo build -p moly-shell --release

      - name: Package .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          WORKSPACE_ROOT="$(pwd)"

          mkdir -p "Moxin Studio.app/Contents/MacOS"
          mkdir -p "Moxin Studio.app/Contents/Resources"

          cp target/release/moxin-studio "Moxin Studio.app/Contents/MacOS/moxin-studio-bin"
          chmod +x "Moxin Studio.app/Contents/MacOS/moxin-studio-bin"

          cp moly-shell/resources/AppIcon.icns "Moxin Studio.app/Contents/Resources/AppIcon.icns"

          # Bundle all resources that Makepad dep() references need at runtime.
          # Makepad bakes absolute compile-time paths into the binary.
          # We copy resources into Contents/Resources/deps/ and the launcher
          # script creates symlinks to recreate the expected directory tree.

          RESOURCES="Moxin Studio.app/Contents/Resources/deps"
          mkdir -p "$RESOURCES"

          # 1) Workspace crate resources (moly-shell, moly-widgets, apps)
          for crate_dir in moly-shell moly-widgets apps/moly-chat apps/moly-settings apps/moly-mcp apps/moly-hub apps/moly-voice; do
            if [ -d "$crate_dir/resources" ]; then
              mkdir -p "$RESOURCES/workspace/$crate_dir"
              cp -R "$crate_dir/resources" "$RESOURCES/workspace/$crate_dir/"
            fi
          done

          # 2) Git dependency resources (makepad-widgets, makepad-component, moly-kit, etc.)
          for dep_dir in $(find ~/.cargo/git/checkouts -maxdepth 4 -name "resources" -type d 2>/dev/null); do
            # Get the checkout path up to the commit hash dir
            # e.g. ~/.cargo/git/checkouts/makepad-abc123/deadbeef/widgets/resources
            # We want to preserve from the checkouts dir onward
            rel="${dep_dir#$HOME/.cargo/git/checkouts/}"
            mkdir -p "$RESOURCES/git/$(dirname "$rel")"
            cp -R "$dep_dir" "$RESOURCES/git/$(dirname "$rel")/"
          done

          # 3) Registry dependency resources
          for dep_dir in $(find ~/.cargo/registry/src -maxdepth 4 -name "resources" -type d 2>/dev/null); do
            rel="${dep_dir#$HOME/.cargo/registry/src/}"
            mkdir -p "$RESOURCES/registry/$(dirname "$rel")"
            cp -R "$dep_dir" "$RESOURCES/registry/$(dirname "$rel")/"
          done

          # Record the paths used at compile time so the launcher can recreate them
          echo "$WORKSPACE_ROOT" > "$RESOURCES/workspace_root.txt"
          echo "$HOME" > "$RESOURCES/build_home.txt"

          # Create launcher script
          cat > "Moxin Studio.app/Contents/MacOS/moxin-studio" <<'LAUNCHER'
          #!/bin/bash
          # Launcher: recreate compile-time resource paths as symlinks
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          RESOURCES="$SCRIPT_DIR/../Resources/deps"

          if [ -f "$RESOURCES/workspace_root.txt" ] && [ -f "$RESOURCES/build_home.txt" ]; then
            BUILD_WORKSPACE="$(cat "$RESOURCES/workspace_root.txt")"
            BUILD_HOME="$(cat "$RESOURCES/build_home.txt")"

            # Symlink workspace root (for crate://self/ resources)
            if [ ! -e "$BUILD_WORKSPACE" ] && [ -d "$RESOURCES/workspace" ]; then
              sudo mkdir -p "$(dirname "$BUILD_WORKSPACE")"
              sudo ln -sf "$RESOURCES/workspace" "$BUILD_WORKSPACE"
            fi

            # Symlink cargo git checkouts (for crate://makepad-widgets/ etc.)
            if [ -d "$RESOURCES/git" ] && [ ! -e "$BUILD_HOME/.cargo/git/checkouts" ]; then
              mkdir -p "$BUILD_HOME/.cargo/git"
              ln -sf "$RESOURCES/git" "$BUILD_HOME/.cargo/git/checkouts"
            fi

            # Symlink cargo registry (for registry dependencies)
            if [ -d "$RESOURCES/registry" ] && [ ! -e "$BUILD_HOME/.cargo/registry/src" ]; then
              mkdir -p "$BUILD_HOME/.cargo/registry"
              ln -sf "$RESOURCES/registry" "$BUILD_HOME/.cargo/registry/src"
            fi
          fi

          exec "$SCRIPT_DIR/moxin-studio-bin" "$@"
          LAUNCHER
          chmod +x "Moxin Studio.app/Contents/MacOS/moxin-studio"

          cat > "Moxin Studio.app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Moxin Studio</string>
              <key>CFBundleDisplayName</key>
              <string>Moxin Studio</string>
              <key>CFBundleIdentifier</key>
              <string>ai.moxin.studio</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleExecutable</key>
              <string>moxin-studio</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Ad-hoc code sign
        run: codesign --force --deep -s - "Moxin Studio.app"

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R "Moxin Studio.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="MoxinStudio-${VERSION}-arm64.dmg"

          hdiutil create -volname "Moxin Studio" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ env.DMG_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
          draft: true
          body: |
            ## Installation

            1. Download `${{ env.DMG_NAME }}`
            2. Open the DMG and drag **Moxin Studio** to Applications
            3. Before first launch, run in Terminal:
               ```
               xattr -cr /Applications/Moxin\ Studio.app
               ```
               (This removes the macOS quarantine flag for unsigned apps)

            ### Requirements
            - macOS 14.0+ (Sonoma) on Apple Silicon (M1–M5)
            - For local model inference: [OminiX-API](https://github.com/OminiX-ai/OminiX-API)

            ### Cloud-only mode
            No additional setup needed — open Settings and add your API keys for OpenAI, Anthropic, Gemini, DeepSeek, or other providers.
